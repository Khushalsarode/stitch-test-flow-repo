name: Verify fix (green path)

# Run manually AFTER Stitch merges a fix — proves the suite passes.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to verify (auth|cart|api|config|utils|hello|all)"
        required: false
        default: "all"

jobs:
  test-green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Run tests with JWT_SECRET set
        env:
          NODE_ENV: test
          JWT_SECRET: stitch-demo-secret-for-green-ci
        run: |
          if [ "${{ inputs.suite }}" = "all" ] || [ -z "${{ inputs.suite }}" ]; then
            npm test
          else
            npm run "test:${{ inputs.suite }}"
          fi
